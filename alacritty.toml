[general]
import = [
    #"~/.config/alacritty/themes/themes/monokai_charcoal.toml"
    "~/.config/alacritty/Themes/Cobalt2.tom"
]

[font]
size = 12.0

[font.normal]
family = "AdwaitaMono Nerd Font Mono"
style = "Regular"

[font.bold]
family = "AdwaitaMono Nerd Font Mono"
style = "Bold"

[font.italic]
family = "AdwaitaMono Nerd Font Mono"
style = "Italic"

[font.bold_italic]
family = "AdwaitaMono Nerd Font Mono"
style = "Bold Italic"

